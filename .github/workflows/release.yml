name: Build MCPB Release

# Runs per-OS because the vendored lib/ dependency tree (pydantic-core,
# cryptography, rpds-py, etc.) contains platform-specific compiled wheels —
# a lib/ built on one OS is not portable to the others. Building natively on
# each runner is simpler and more reliable than cross-compiling wheels with
# `pip --platform`.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            asset_name: agenticsettle-verify-darwin.mcpb
          - os: windows-latest
            asset_name: agenticsettle-verify-win32.mcpb
          - os: ubuntu-latest
            asset_name: agenticsettle-verify-linux.mcpb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Vendor runtime dependencies into lib/
        run: |
          python -m pip install --upgrade pip
          pip install --target lib "mcp>=1.2.0" "httpx>=0.27.0" "python-dotenv>=1.0.0" --no-compile

      - name: Validate manifest
        run: mcpb validate manifest.json

      - name: Pack .mcpb bundle
        run: mcpb pack . "${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
