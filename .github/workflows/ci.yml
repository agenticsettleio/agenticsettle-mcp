name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.6.0"
      - name: Ruff check
        run: ruff check .

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: |
          pip install -e .
          pip install pytest pytest-asyncio
      - name: Run tests
        run: pytest tests/ -v

  manifest-check:
    name: Validate manifest.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON syntax
        run: python -c "import json; json.load(open('manifest.json', encoding='utf-8')); print('manifest.json is valid JSON')"
